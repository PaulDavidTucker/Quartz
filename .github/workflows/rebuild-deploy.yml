name: Build and Deploy Quartz Site

on:
  repository_dispatch:
    types: [content-updated] 
  workflow_dispatch:

  push:
     branches:
       - develop 

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      pages: write    
      id-token: write 

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v3 
        with:

          token: ${{ secrets.QUARTZ_REPO_TOKEN }}
          
      - name: Update Content Submodule
        run: |
          git submodule update --init --remote --recursive

      - name: Setup Node.js
        uses: actions/setup-node@v3 # Or a newer version
        with:
          node-version: '20' 
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Quartz Site
        run: npx quartz build 

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v2 # Or a newer version
        with:
          path: ./public
      
      - name: Deploy to GitHub Pages (official)
        id: deployment
        uses: actions/deploy-pages@v2 
