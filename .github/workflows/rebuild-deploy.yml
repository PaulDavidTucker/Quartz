name: Build and Deploy Quartz Site

on:
  repository_dispatch:
    types: [content-updated] 
  workflow_dispatch:

  push:
     branches:
       - develop 

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      pages: write    
      id-token: write 

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4 
        with:
          token: ${{ secrets.QUARTZ_REPO_TOKEN }}
          submodules: 'recursive'
          persist-credentials: true
          
      - name: Ensure submodule is at latest commit
        run: |
          cd content
          git pull origin $(git rev-parse --abbrev-ref HEAD) # Pull latest from its current branch
          cd ..

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Or a newer version
        with:
          node-version: '20' 
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Quartz Site
        run: npx quartz build 

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3 # Or a newer version
        with:
          path: ./public
      
      - name: Deploy to GitHub Pages (official)
        id: deployment
        uses: actions/deploy-pages@v4
